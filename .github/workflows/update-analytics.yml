name: Refresh Analytics Data

on:
  schedule:
    # Every 5 days at 9 AM UTC. Keeps gaps under the 7-day cache-eviction
    # window so the incremental dataset cache stays warm.
    - cron: '0 9 */5 * *'
  workflow_dispatch:
    inputs:
      dryrun:
        description: 'Dry run mode (log changes instead of creating PR)'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 #v6.3.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 #v8.2.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      # Persist the incremental-fetch datasets across runs without committing
      # them to git. A unique key per run always saves; restore-keys pulls the
      # most recent prior dataset. If the cache is ever evicted, the pipeline's
      # 30-day self-heal just does one full fetch, then resumes incrementally.
      - name: Restore incremental datasets
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: outputs/data/datasets
          key: analytics-datasets-${{ github.run_id }}
          restore-keys: |
            analytics-datasets-

      - name: Run all analytics pipelines
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python -m hiero_analytics.run_all

      # Only persist datasets when the run succeeds. Saving after a failed run
      # would let a partial snapshot become the next incremental baseline
      # (restore picks the most recent analytics-datasets- key); on failure we
      # keep the last good cache and let the next run resume from it.
      - name: Save incremental datasets
        uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: outputs/data/datasets
          key: analytics-datasets-${{ github.run_id }}

      # Publish the self-contained dashboard to GitHub Pages so anyone can view the
      # latest refresh without cloning or regenerating. The HTML embeds every chart
      # as base64, so the site is a single index.html. _site is gitignored, so it is
      # not picked up by the "git add -A" below.
      - name: Assemble Pages site
        if: inputs.dryrun != 'true'
        run: |
          mkdir -p _site
          cp outputs/dashboard.html _site/index.html

      - name: Upload Pages artifact
        if: inputs.dryrun != 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for existing PR opened this week
        id: check_existing_pr
        if: steps.check_changes.outputs.has_changes == 'true' && inputs.dryrun != 'true'
        run: |
          WEEK_START=$(date -u -d "-$(( $(date -u +%u) - 1 )) days" +%Y-%m-%d)
          echo "Checking for PRs opened this week (since $WEEK_START)..."
          
          # Get open PRs created by the bot this week with matching labels and title
          PRS=$(gh pr list \
            --state open \
            --label automated \
            --label analytics \
            --json createdAt,number,title,author \
            --jq ".[] | select(.author.login == \"github-actions[bot]\") | select(.createdAt >= \"$WEEK_START\") | select(.title | contains(\"Refresh Analytics Data\")) | .number" \
            2>/dev/null || echo "")
          
          if [ -z "$PRS" ]; then
            echo "pr_exists=false" >> $GITHUB_OUTPUT
            echo "No existing refresh PR found for this week"
          else
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "Found existing refresh PR(s): $PRS"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Log changes (dry run)
        if: steps.check_changes.outputs.has_changes == 'true' && inputs.dryrun == 'true'
        run: |
          echo "::group::Modified files"
          git diff --name-only
          echo "::endgroup::"
          echo "::group::Changes summary"
          git diff --stat
          echo "::endgroup::"
          echo "::group::Full diff"
          git diff
          echo "::endgroup::"

      - name: Stage all changes
        if: steps.check_changes.outputs.has_changes == 'true' && inputs.dryrun != 'true' && steps.check_existing_pr.outputs.pr_exists != 'true'
        run: |
          git add -A

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true' && inputs.dryrun != 'true' && steps.check_existing_pr.outputs.pr_exists != 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 #v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sign-commits: true
          commit-message: 'chore: refresh analytics data and charts'
          title: '[Automated] Refresh Analytics Data'
          body: |
            ## Automated Analytics Refresh

            This PR contains updated analytics data and charts generated by the weekly scheduled refresh workflow.

            ### Changes
            - Updated CSV data files in `outputs/data/`
            - Updated PNG charts in `outputs/charts/`
            - Refreshed cached data
            - Updated OpenSSF Scorecard scores and check breakdowns
            - Updated CODEOWNERS compliance and runner-type reports

            **Note:** This is an automated PR. Please review the changes before merging.
          branch: analytics-refresh-${{ github.run_number }}
          delete-branch: true
          labels: |
            automated
            analytics

  # Publish the freshly-built dashboard to GitHub Pages. Runs after the data refresh
  # regardless of whether the data changed, so the public page always reflects the
  # most recent run. Skipped on dry runs. Requires Pages "Source: GitHub Actions"
  # to be enabled once in the repository settings.
  deploy-pages:
    name: Deploy dashboard to GitHub Pages
    needs: refresh-data
    if: inputs.dryrun != 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
