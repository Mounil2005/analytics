# Maintainer / governance participant -> organisation, for the diversity charts.
# Regenerate with examples/build_affiliations.py. Seeded from public signals
# (GPG-key email, profile email, MAINTAINERS.md, company field, profile bio,
# org membership, solo domain, commit-author email), in that precedence.
# Obfuscated noreply addresses never count. Lineage: Swirlds Labs was renamed
# to Hashgraph; Hedera and Hgraph stay separate.
#
# Values: an organisation name | "Independent" (solo / personal-email only) |
# "?" (unknown — no public signal).
#
# Each row's comment is 'governance-role · name' (maintainer | committer |
# triage | team). Only the 104 maintainers feed the maintainer-org charts;
# the rest are here so the team-concentration view is fully covered.
#
# TO HAND-CORRECT a row so it STANDS OUT and survives regeneration: change the
# value and append '# manual' (or '# manual: your reason'). It is re-flagged
# below as 'MANUAL' with the resolver's competing guess, and never overwritten.
