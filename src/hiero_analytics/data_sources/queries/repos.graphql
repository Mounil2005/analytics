query REPOS_QUERY($org:String!,$cursor:String){
  organization(login:$org){
    repositories(first:100, after:$cursor){
      pageInfo{
        hasNextPage
        endCursor
      }
      nodes{
        name
        pushedAt
        primaryLanguage{
          name
        }
        createdAt
        stargazerCount
        forkCount
      }
    }
  }
  rateLimit{
    limit
    remaining
    cost
    resetAt
  }
}