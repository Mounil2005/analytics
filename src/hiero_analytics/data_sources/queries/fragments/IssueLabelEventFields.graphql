fragment IssueLabelEventFields on Issue {
  number
  timelineItems(first:100, itemTypes:[LABELED_EVENT,UNLABELED_EVENT]){
    pageInfo{ hasNextPage }
    nodes{
      __typename
      ... on LabeledEvent{
        createdAt
        label{ name }
        actor{ login }
      }
      ... on UnlabeledEvent{
        createdAt
        label{ name }
        actor{ login }
      }
    }
  }
}
