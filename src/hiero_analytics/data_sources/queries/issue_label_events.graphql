query ISSUE_LABEL_EVENTS_QUERY($owner:String!,$repo:String!,$cursor:String,$states:[IssueState!]){
  repository(owner:$owner,name:$repo){
    issues(first:100, after:$cursor, states:$states){
      pageInfo{
        hasNextPage
        endCursor
      }
      nodes{
        number
        timelineItems(first:100, itemTypes:[LABELED_EVENT,UNLABELED_EVENT]){
          nodes{
            __typename
            ... on LabeledEvent{
              createdAt
              label{ name }
            }
            ... on UnlabeledEvent{
              createdAt
              label{ name }
            }
          }
        }
      }
    }
  }
  rateLimit{
    limit
    remaining
    cost
    resetAt
  }
}
